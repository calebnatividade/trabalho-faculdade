<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <style>
        /* Estilo simples que eu mesmo fiz */
        body {
            background-color: #2c3e50;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .calculadora {
            background-color: #34495e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            width: 300px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        #tela {
            width: 100%;
            height: 60px;
            background-color: #ecf0f1;
            border: none;
            border-radius: 10px;
            font-size: 28px;
            text-align: right;
            padding: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-family: monospace;
        }
        
        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        button {
            background-color: #ecf0f1;
            border: none;
            padding: 20px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background-color: #bdc3c7;
        }
        
        .operacao {
            background-color: #e67e22;
            color: white;
        }
        
        .operacao:hover {
            background-color: #d35400;
        }
        
        .igual {
            background-color: #27ae60;
            color: white;
            grid-column: span 2;
        }
        
        .limpar {
            background-color: #c0392b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="calculadora">
        <h1>Calculadora</h1>
        <input type="text" id="tela" readonly>
        <div class="botoes">
            <button class="limpar" onclick="limparTela()">C</button>
            <button onclick="apagarUm()">⌫</button>
            <button class="operacao" onclick="inserir('/')">÷</button>
            <button class="operacao" onclick="inserir('*')">×</button>
            
            <button onclick="inserir('7')">7</button>
            <button onclick="inserir('8')">8</button>
            <button onclick="inserir('9')">9</button>
            <button class="operacao" onclick="inserir('-')">-</button>
            
            <button onclick="inserir('4')">4</button>
            <button onclick="inserir('5')">5</button>
            <button onclick="inserir('6')">6</button>
            <button class="operacao" onclick="inserir('+')">+</button>
            
            <button onclick="inserir('1')">1</button>
            <button onclick="inserir('2')">2</button>
            <button onclick="inserir('3')">3</button>
            <button class="igual" onclick="calcular()">=</button>
            
            <button onclick="inserir('0')">0</button>
            <button onclick="inserir('.')">.</button>
            <button onclick="inserir('00')">00</button>
        </div>
    </div>

    <script>
        // Função para colocar números na tela
        function inserir(valor) {
            let tela = document.getElementById('tela');
            tela.value = tela.value + valor;
        }
        
        // Função para limpar tudo
        function limparTela() {
            document.getElementById('tela').value = '';
        }
        
        // Função para apagar o último número
        function apagarUm() {
            let tela = document.getElementById('tela');
            tela.value = tela.value.slice(0, -1);
        }
        
        // Função para fazer a conta
        function calcular() {
            let tela = document.getElementById('tela');
            let expressao = tela.value;
            
            // Trocar ÷ e × por / e *
            expressao = expressao.replace('÷', '/');
            expressao = expressao.replace('×', '*');
            
            try {
                let resultado = eval(expressao);
                tela.value = resultado;
            } catch(erro) {
                tela.value = 'Erro!';
                setTimeout(() => {
                    limparTela();
                }, 1000);
            }
        }
        
        // Permitir teclado também
        document.addEventListener('keydown', function(event) {
            const tecla = event.key;
            
            if (tecla >= '0' && tecla <= '9') {
                inserir(tecla);
            } else if (tecla === '+' || tecla === '-' || tecla === '*' || tecla === '/') {
                inserir(tecla);
            } else if (tecla === '.') {
                inserir('.');
            } else if (tecla === 'Enter') {
                calcular();
            } else if (tecla === 'Escape') {
                limparTela();
            } else if (tecla === 'Backspace') {
                apagarUm();
            }
        });
    </script>
</body>
</html>
