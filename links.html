<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meus Links</title>
    <style>
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #f4f4f4;
            padding: 30px;
            border-radius: 15px;
        }
        .titulo {
            color: #333;
            text-align: center;
        }
        .link {
            display: block;
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            text-decoration: none;
            color: #007bff;
            border-radius: 8px;
        }
        .link:hover {
            background: #007bff;
            color: white;
        }
        .lista li {
            margin-bottom: 15px;
            list-style: none;
        }
        .secao > p {
            font-weight: bold;
            margin-bottom: 15px;
        }
        .link + span {
            font-size: 12px;
            color: gray;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="titulo">📌 Meus Projetos</h1>

        <div class="secao">
            <p>Links das atividades:</p>

            <ul class="lista">
                <li>
                    <!-- COLE SEU LINK DO PET AQUI -->
                    <a href="https://SEUUSUARIO.github.io/pet/index.html" class="link">🐾 Página do Pet - Thor</a>
                    <span>Atividade 27/02</span>
                </li>
                <li>
                    <!-- COLE SEU LINK DA CARTA AQUI -->
                    <a href="https://SEUUSUARIO.github.io/carta/index.html" class="link">💌 Carta de Incentivo</a>
                    <span>Atividade 06/03</span>
                </li>
                <li>
                    <!-- ESTA PÁGINA DE LINKS -->
                    <a href="#" class="link">📋 Portfólio de Links</a>
                    <span>Atividade 13/03</span>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
